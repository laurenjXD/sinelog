version: '3.8'

services:
  sinelog:
    build: .
    image: sinelog:latest
    container_name: sinelog
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
