<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SineLog — Discover, rate and review films. Your personal film diary." />
  <title>SineLog — Discover. Rate. Remember.</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Tailwind (utility helpers only — primary styles in styles.css) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f5f5f8" />
</head>
<body>

  <!-- ═══════════ NAVIGATION (mounted by nav.js) ═══════════ -->
  <nav id="navbar" class="glass-nav"></nav>

  <!-- ═══════════ SPA APP SHELL ═══════════ -->
  <div id="app"></div>

  <!-- ═══════════ MOVIE MODAL ═══════════ -->
  <div id="movie-modal" role="dialog" aria-modal="true" aria-label="Movie Details">
    <div id="modal-backdrop-el"></div>
    <div id="modal-sheet" class="glass-modal"></div>
  </div>

  <!-- ═══════════ AUTH PANEL ═══════════ -->
  <div id="auth-panel" role="dialog" aria-modal="true" aria-label="Sign In">
    <div id="auth-panel-backdrop"></div>
    <div id="auth-box" class="glass-modal"></div>
  </div>

  <!-- ═══════════ TOAST ═══════════ -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- ═══════════ SCRIPTS ═══════════ -->

  <!-- 1. Core config + utilities -->
  <script src="app.js"></script>

  <!-- 2. TMDB API -->
  <script src="tmdb.js"></script>

  <!-- 3. Auth logic + UI -->
  <script src="auth.js"></script>

  <!-- 4. Supabase DB store -->
  <script src="store.js"></script>

  <!-- 5. Navigation bar -->
  <script src="nav.js"></script>

  <!-- 6. Movie modal -->
  <script src="modal.js"></script>

  <!-- 7. Page components -->
  <script src="ui/home.js"></script>
  <script src="ui/feed.js"></script>
  <script src="ui/profile.js"></script>
  <script src="ui/search-page.js"></script>

  <!-- 8. Bootstrap -->
  <script>
    (async () => {
      const cfg = SL.CONFIG;
      const missingKey      = cfg.TMDB_KEY === 'YOUR_TMDB_API_KEY_HERE';
      const missingSupabase = cfg.SUPABASE_URL === 'YOUR_SUPABASE_PROJECT_URL';

      // ── Init Supabase client ─────────────────────────────────
      if (!missingSupabase) {
        window._supabase = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON);
      } else {
        window._supabase = {
          auth: {
            getSession: async () => ({ data: { session: null } }),
            onAuthStateChange: () => ({ data: { subscription: { unsubscribe: () => {} } } }),
            signInWithPassword: async () => { throw new Error('Supabase not configured — add your keys to app.js'); },
            signUp: async () => { throw new Error('Supabase not configured — add your keys to app.js'); },
            resetPasswordForEmail: async () => { throw new Error('Supabase not configured — add your keys to app.js'); },
            updateUser: async () => { throw new Error('Supabase not configured — add your keys to app.js'); },
            signOut: async () => {},
          },
          from: () => ({
            select: () => ({ eq: () => ({ maybeSingle: async () => ({ data: null }) }) }),
            upsert: () => ({ select: () => ({ single: async () => ({ data: null, error: new Error('Supabase not configured') }) }) }),
            insert: async () => ({ error: new Error('Supabase not configured') }),
            delete: () => ({ eq: () => ({ eq: async () => ({}) }) }),
            update: () => ({ eq: async () => ({}) }),
          }),
        };
      }

      // ── Init auth ────────────────────────────────────────────
      await SL.Auth.init();

      // ── Render navbar ─────────────────────────────────────────
      SL.Nav.update();

      // ── Setup required screen ─────────────────────────────────
      if (missingKey) {
        document.getElementById('app').innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;flex-direction:column;gap:24px">
            <div style="font-family:var(--font-heading);font-size:3rem;letter-spacing:0.1em;color:var(--accent)">SINELOG</div>
            <h2 style="font-family:var(--font-heading);font-size:1.5rem;color:var(--text)">Setup Required</h2>
            <div style="max-width:520px;font-size:14px;line-height:1.9;color:var(--ghost);text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px">
              <p style="margin-bottom:12px">Open <code style="background:var(--surface-2);padding:2px 6px;border-radius:4px;font-size:12px">app.js</code> and fill in your keys:</p>
              <pre style="font-size:12px;color:var(--accent);background:var(--surface-2);padding:16px;border-radius:8px;overflow-x:auto;line-height:1.7">TMDB_KEY:      'your_tmdb_v3_api_key'
SUPABASE_URL:  'https://xyz.supabase.co'
SUPABASE_ANON: 'your_supabase_anon_key'</pre>
              <p style="margin-top:14px;font-size:13px;color:var(--mist)">
                Get a free TMDB key at <a href="https://www.themoviedb.org/settings/api" target="_blank" style="color:var(--accent)">themoviedb.org</a>
                and Supabase at <a href="https://supabase.com" target="_blank" style="color:var(--accent)">supabase.com</a>.
                Run the SQL schema in <code style="font-size:11px;background:var(--surface-2);padding:2px 5px;border-radius:4px">supabase-schema.sql</code> after creating your project.
              </p>
            </div>
          </div>
        `;
        return;
      }

      // ── Navigate to home ──────────────────────────────────────
      await SL.Router.navigate('home');
    })();
  </script>
</body>
</html>
