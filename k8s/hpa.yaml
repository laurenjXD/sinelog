apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sinelog
  namespace: sinelog
  labels:
    app: sinelog
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sinelog
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120    # Wait 2 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
