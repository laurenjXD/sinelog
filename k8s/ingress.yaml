apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sinelog
  namespace: sinelog
  labels:
    app: sinelog
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Optional: enable CORS if your API calls need it
    # nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: sinelog.example.com       # ← Replace with your real domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sinelog
                port:
                  number: 80
  # ── TLS (enable after setting up cert-manager or a manual secret) ──
  # tls:
  #   - hosts:
  #       - sinelog.example.com
  #     secretName: sinelog-tls
